version: '3.9'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: nft_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      PORT: 4000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/nft_platform
      JWT_SECRET: local_super_secret
      CORS_ORIGIN: http://localhost:3000
    ports:
      - '4000:4000'
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  pg_data:
